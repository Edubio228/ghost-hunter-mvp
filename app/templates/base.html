<!-- app/templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Hunter - {% block title %}Dashboard{% endblock %}</title>
    
    <!-- ========== FAVICON ========== -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="manifest" href="/static/icons/site.webmanifest">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #11998e;
            --danger-color: #f44336;
            --warning-color: #ff9800;
        }
        
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .navbar {
            background: var(--primary-color);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            color: white !important;
            font-weight: 600;
            font-size: 1.4rem;
        }
        
        .navbar-brand i {
            margin-right: 10px;
        }
        
        .nav-link {
            color: rgba(255,255,255,0.8) !important;
            transition: color 0.2s;
        }
        
        .nav-link:hover {
            color: white !important;
        }
        
        .nav-link i {
            margin-right: 8px;
        }
        
        .dark-mode-toggle {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        
        .dark-mode-toggle:hover {
            background: rgba(255,255,255,0.25);
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, background-color 0.3s, color 0.3s;
        }
        
        .card:hover {
            transform: translateY(-2px);
        }
        
        .stats-card {
            background: linear-gradient(135deg, var(--success-color), #38ef7d);
            color: white;
            border-radius: 15px;
            padding: 2rem;
        }
        
        .stats-card .number {
            font-size: 2.8rem;
            font-weight: 700;
        }
        
        .stats-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .ghost-badge {
            background: var(--danger-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .sus-badge {
            background: var(--warning-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .active-badge {
            background: #4caf50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .table th {
            background: var(--primary-color);
            color: white;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        
        .recover-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .recover-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        .recover-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        .recover-btn.success {
            background: #28a745;
        }
        
        .recover-btn.error {
            background: #dc3545;
        }
        
        .recover-btn.loading {
            background: #ffc107;
            color: #333;
        }
        
        /* ============================================================
           DARK MODE STYLES
           ============================================================ */
        body.dark-mode {
            background: #1a1a2e;
            color: #eee;
        }
        
        body.dark-mode .card {
            background: #16213e;
            color: #eee;
        }
        
        body.dark-mode .table {
            color: #eee;
        }
        
        body.dark-mode .table td {
            border-color: #2a2a4a;
            color: #eee;
        }
        
        body.dark-mode .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: rgba(255,255,255,0.03);
        }
        
        body.dark-mode .bg-white {
            background: #16213e !important;
        }
        
        body.dark-mode .text-muted {
            color: #aaa !important;
        }
        
        body.dark-mode .alert-warning {
            background: #2d1f1f;
            color: #f0c040;
            border-color: #5a3a1a;
        }
        
        body.dark-mode .form-control {
            background: #1a1a2e;
            color: #eee;
            border-color: #2a2a4a;
        }
        
        body.dark-mode .form-control:focus {
            background: #1a1a2e;
            color: #eee;
        }
        
        body.dark-mode .btn-outline-secondary {
            color: #ccc;
            border-color: #2a2a4a;
        }
        
        @media (max-width: 768px) {
            .stats-card .number {
                font-size: 2rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-ghost"></i> Ghost Hunter
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                            <i class="bi bi-moon"></i> <span id="darkModeLabel">Dark</span>
                        </button>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        // ============================================================
        // DARK MODE TOGGLE
        // ============================================================
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'true' : 'false');
            
            const label = document.getElementById('darkModeLabel');
            const icon = document.querySelector('.dark-mode-toggle i');
            
            if (isDark) {
                label.textContent = 'Light';
                icon.className = 'bi bi-sun';
            } else {
                label.textContent = 'Dark';
                icon.className = 'bi bi-moon';
            }
        }
        
        // Load dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            const label = document.getElementById('darkModeLabel');
            const icon = document.querySelector('.dark-mode-toggle i');
            if (label) label.textContent = 'Light';
            if (icon) icon.className = 'bi bi-sun';
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
